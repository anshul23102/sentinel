services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
       VITE_BACKEND_URL: http://localhost:8000
    restart: unless-stopped
    